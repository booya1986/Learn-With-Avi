name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'

jobs:
  # Check if required secrets are available
  check-secrets:
    name: Check Secrets
    runs-on: ubuntu-latest
    outputs:
      has-secrets: ${{ steps.check.outputs.has-secrets }}
    steps:
      - name: Check if DATABASE_URL secret is available
        id: check
        run: |
          if [ -z "${{ secrets.DATABASE_URL }}" ]; then
            echo "has-secrets=false" >> $GITHUB_OUTPUT
            echo "WARNING: DATABASE_URL secret not configured. E2E tests will be skipped."
          else
            echo "has-secrets=true" >> $GITHUB_OUTPUT
            echo "E2E tests will run (DATABASE_URL secret is configured)"
          fi
        shell: bash

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: check-secrets
    if: needs.check-secrets.outputs.has-secrets == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Clean build artifacts
        run: npm run clean
        continue-on-error: true

      - name: Build Next.js
        run: npm run build
        env:
          NODE_ENV: production
        continue-on-error: false

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          CI: true
          NODE_ENV: test
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        continue-on-error: false

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test-results/
          retention-days: 30

      - name: Comment on PR with test results
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            const resultsPath = 'test-results/results.json';
            if (fs.existsSync(resultsPath)) {
              const results = JSON.parse(fs.readFileSync(resultsPath, 'utf8'));
              const totalTests = results.stats?.expected || 0;
              const failedTests = results.stats?.unexpected || 0;
              const skipped = results.stats?.skipped || 0;

              const status = failedTests === 0 ? '✅' : '❌';

              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: `${status} **E2E Test Results**

Total Tests: ${totalTests}
Failed: ${failedTests}
Skipped: ${skipped}

View the [full Playwright report](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}).`
              });
            }

  e2e-skipped:
    name: E2E Tests Skipped
    runs-on: ubuntu-latest
    needs: check-secrets
    if: needs.check-secrets.outputs.has-secrets == 'false'
    steps:
      - name: Notify E2E tests skipped
        run: |
          echo "E2E tests skipped: DATABASE_URL secret not configured"
          echo ""
          echo "To enable E2E tests, configure the DATABASE_URL secret:"
          echo "  1. Go to: https://github.com/${{ github.repository }}/settings/secrets/actions"
          echo "  2. Add new secret 'DATABASE_URL' with your test database URL"
          echo "  3. Re-run this workflow"
          echo ""
          echo "Note: E2E tests are optional and won't block CI/CD pipeline"
        shell: bash

  e2e-results:
    name: E2E Results
    runs-on: ubuntu-latest
    needs: [check-secrets, e2e]
    if: always() && needs.check-secrets.outputs.has-secrets == 'true'
    steps:
      - name: Check E2E test results
        run: |
          if [[ "${{ needs.e2e.result }}" == "failure" ]]; then
            echo "E2E tests failed"
            exit 1
          fi
        shell: bash
